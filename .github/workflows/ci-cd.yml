name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8
      - name: Run linter
        run: |
          flake8 Backend/app/ ml/ \
            --max-line-length=120 \
            --exclude=__pycache__,ml/NAB \
            --ignore=E501,W503

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker compose -f docker/docker-compose.yml build backend

  test:
    name: Test Predict Endpoint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r Backend/requirements.txt

      - name: Train model for CI
        run: |
          pip install scikit-learn pandas numpy
          python ml/prepare_dataset.py
          python ml/train_model.py

      - name: Start backend
        run: |
          cd Backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Prime rolling window
        run: |
          for ts in "21:40" "21:45" "21:50" "21:55"; do
            curl -s -X POST http://localhost:8000/predict \
              -H "Content-Type: application/json" \
              -d "{\"cpu_percent\": 0.13, \"timestamp\": \"2014-02-26T${ts}:00\"}"
          done

      - name: Test normal reading
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"cpu_percent": 0.13, "timestamp": "2014-02-26T21:58:00"}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep '"anomaly":false'

      - name: Test anomaly detection
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"cpu_percent": 2.344, "timestamp": "2014-02-26T22:05:00"}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep '"anomaly":true'
